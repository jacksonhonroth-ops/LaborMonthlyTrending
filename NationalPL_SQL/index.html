<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P&amp;L Overview</title>
  <link rel="stylesheet" href="app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="card-wrapper">
    <div id="card-header">
      <h1>P&amp;L Overview</h1>
      <div id="header-legend">
        <span class="legend-item legend-act">ACT = Actuals (Closed Period)</span>
        <span class="legend-item legend-fcst">FCST = Forecast</span>
      </div>
    </div>
    <div id="filter-bar">
      <div class="filter-group">
        <label>Region</label>
        <div id="region-multi" class="multi-select">
          <div class="multi-select-toggle" id="region-toggle">Select regions&hellip;</div>
          <div class="multi-select-dropdown hidden" id="region-dropdown"></div>
        </div>
      </div>
      <button id="filter-clear">Clear</button>
    </div>
    <div id="table-wrapper">
      <div id="loader">
        <div class="spinner"></div>
        <span>Loading financial data&hellip;</span>
      </div>
      <table id="pl-table">
        <thead id="pl-thead"></thead>
        <tbody id="pl-tbody"></tbody>
      </table>
    </div>
  </div>
  <script src="https://unpkg.com/ryuu.js@4.6.0/dist/domo.js"></script>
  <script src="app.js"></script>
</body>
</html>
