<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Revenue Trend MoM</title>
    <link rel="stylesheet" href="app.css" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400,300,600,700" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <!-- Header row -->
      <div id="card-header">
        <h1 id="card-title">Revenue Trend MoM</h1>
        <div id="header-right">
          <div id="legend">
            <span class="legend-item">
              <span class="legend-bar actual"></span> Actual
            </span>
            <span class="legend-item">
              <span class="legend-bar forecast"></span> Forecast
            </span>
            <span class="legend-item">
              <span class="legend-line budget-line"></span> Budget
            </span>
            <span class="legend-item">
              <span class="legend-line mom-line"></span> MoM Var %
            </span>
          </div>
          <div id="view-toggle">
            <button id="btn-chart" class="toggle-btn active" title="Chart view">
              <span class="material-icons-round">bar_chart</span>
            </button>
            <button id="btn-table" class="toggle-btn" title="Table view">
              <span class="material-icons-round">table_chart</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Filter bar -->
      <div id="filter-bar">
        <div class="filter-group">
          <label for="filter-region">Region</label>
          <select id="filter-region"><option value="">All</option></select>
        </div>
        <div class="filter-group">
          <label for="filter-account">Parent Account</label>
          <input id="filter-account" type="text" list="account-list" placeholder="Search..." autocomplete="off">
          <datalist id="account-list"></datalist>
        </div>
        <div class="filter-group">
          <label for="filter-job">Job Number</label>
          <input id="filter-job" type="text" list="job-list" placeholder="Search..." autocomplete="off">
          <datalist id="job-list"></datalist>
        </div>
        <button id="filter-clear" title="Clear all filters">Clear</button>
      </div>

      <!-- Chart view -->
      <div id="chart-container">
        <div id="loader">
          <div class="spinner"></div>
          <span id="loader-text">Loading data...</span>
        </div>
        <canvas id="revenueChart"></canvas>
      </div>

      <!-- Table view (hidden by default) -->
      <div id="table-container" class="hidden">
        <table id="summary-table">
          <thead id="summary-thead"></thead>
          <tbody id="summary-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Drill-down overlay -->
    <div id="drilldown-overlay" class="hidden">
      <div id="drilldown-modal">
        <div id="drilldown-header">
          <h2 id="drilldown-title"></h2>
          <button id="drilldown-close">&times;</button>
        </div>
        <div id="drilldown-body">
          <table id="drilldown-table">
            <thead><tr id="drilldown-thead"></tr></thead>
            <tbody id="drilldown-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/ryuu.js@4.6.0/dist/domo.js" integrity="sha384-YYsd9wQ+wDlUWhvpfGdptxmNYIqBC+52oJtWgPKJadbs3sSFTY/+ZotPbEHTTRWz" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="app.js"></script>
</body></html>
