<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>National P&amp;L</title>
  <link rel="stylesheet" href="app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="card-wrapper">
    <div id="card-header">
      <h1>National P&amp;L</h1>
      <div id="header-legend">
        <span class="legend-item legend-act">ACT = Actuals (Closed Period)</span>
        <span class="legend-item legend-fcst">FCST = Forecast</span>
      </div>
    </div>
    <div id="filter-bar">
      <div class="filter-group">
        <label for="filter-region">Region</label>
        <select id="filter-region"><option value="">All</option></select>
      </div>
      <div class="filter-group">
        <label for="filter-ops">Ops Lead</label>
        <select id="filter-ops"><option value="">All</option></select>
      </div>
      <div class="filter-group">
        <label for="filter-job">Job Number</label>
        <input id="filter-job" type="text" list="job-list" placeholder="Search..." autocomplete="off">
        <datalist id="job-list"></datalist>
      </div>
      <div class="filter-group">
        <label for="filter-account">Parent Account</label>
        <input id="filter-account" type="text" list="account-list" placeholder="Search..." autocomplete="off">
        <datalist id="account-list"></datalist>
      </div>
      <button id="filter-clear">Clear</button>
    </div>
    <div id="table-wrapper">
      <div id="loader">
        <div class="spinner"></div>
        <span>Loading financial data&hellip;</span>
      </div>
      <table id="pl-table">
        <thead id="pl-thead"></thead>
        <tbody id="pl-tbody"></tbody>
      </table>
    </div>
  </div>
  <script src="https://unpkg.com/ryuu.js@4.6.0/dist/domo.js"></script>
  <script src="app.js"></script>
</body>
</html>
