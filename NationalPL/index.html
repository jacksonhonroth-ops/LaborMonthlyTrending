<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>National P&amp;L</title>
  <link rel="stylesheet" href="app.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="card-wrapper">
    <div id="card-header">
      <h1>National P&amp;L</h1>
      <div id="header-legend">
        <span class="legend-item legend-act">ACT = Actuals (Closed Period)</span>
        <span class="legend-item legend-fcst">FCST = Forecast</span>
      </div>
    </div>
    <div id="table-wrapper">
      <div id="loader">
        <div class="spinner"></div>
        <span>Loading financial data&hellip;</span>
      </div>
      <table id="pl-table">
        <thead id="pl-thead"></thead>
        <tbody id="pl-tbody"></tbody>
      </table>
    </div>
  </div>
  <script src="domo.js"></script>
  <script src="app.js"></script>
</body>
</html>
